name: Feature request
description: Suggest an idea or improvement for Create Convex Cloud (e.g. support for another platform).
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! A couple of quick notes so we can triage fast.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Context + what you're trying to do today.
      placeholder: e.g. I'd like Create Convex Cloud to support deploying to Cloudflare instead of Vercel.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Rough idea of how it could work. Happy with hand-wavy — we'll iterate.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Anything you tried or looked at (other tools, workarounds, etc.).
    validations:
      required: false
